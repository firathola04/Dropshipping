<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion · DropManage</title>
  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <!-- Google Font: Inter -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <style>
    :root {
      --emerald-50: #ecfdf5;
      --emerald-100: #d1fae5;
      --emerald-200: #a7f3d0;
      --emerald-300: #6ee7b7;
      --emerald-400: #34d399;
      --emerald-500: #10b981;
      --emerald-600: #059669;
      --emerald-700: #047857;
      --emerald-800: #065f46;
      --emerald-900: #064e3b;
      --emerald-950: #022c22;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #f0fdf4 0%, #ffffff 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
    }

    .auth-wrapper {
      width: 100%;
      padding: 2rem 1rem;
    }

    .auth-card {
      background: white;
      border-radius: 40px;
      padding: 3rem;
      box-shadow: 0 20px 60px -15px rgba(5, 150, 105, 0.2);
      border: 1px solid rgba(5, 150, 105, 0.1);
      max-width: 500px;
      margin: 0 auto;
    }

    .auth-header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .auth-logo {
      font-weight: 800;
      font-size: 2rem;
      color: var(--emerald-700);
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
      text-decoration: none;
    }

    .auth-logo i {
      color: var(--emerald-500);
      font-size: 2.2rem;
    }

    .auth-title {
      font-size: 2rem;
      font-weight: 700;
      color: var(--emerald-950);
      margin-bottom: 0.5rem;
    }

    .auth-subtitle {
      color: #64748b;
      font-size: 1rem;
    }

    .auth-form .form-label {
      font-weight: 600;
      color: #334155;
      margin-bottom: 0.5rem;
    }

    .auth-form .form-control {
      border: 2px solid #e2e8f0;
      border-radius: 16px;
      padding: 0.8rem 1.2rem;
      font-size: 1rem;
      transition: 0.2s;
    }

    .auth-form .form-control:focus {
      border-color: var(--emerald-400);
      box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1);
    }

    .auth-form .input-group {
      border-radius: 16px;
    }

    .auth-form .input-group-text {
      background: white;
      border: 2px solid #e2e8f0;
      border-right: none;
      border-radius: 16px 0 0 16px;
      color: #94a3b8;
    }

    .auth-form .input-group .form-control {
      border-left: none;
      border-radius: 0 16px 16px 0;
    }

    .btn-auth {
      background: var(--emerald-600);
      color: white;
      border-radius: 50px;
      padding: 1rem;
      font-weight: 700;
      font-size: 1.1rem;
      border: none;
      width: 100%;
      transition: 0.2s;
      margin-top: 1rem;
    }

    .btn-auth:hover {
      background: var(--emerald-700);
      transform: translateY(-2px);
      box-shadow: 0 10px 25px -8px var(--emerald-600);
    }

    .btn-outline-auth {
      background: transparent;
      border: 2px solid var(--emerald-300);
      color: var(--emerald-700);
      border-radius: 50px;
      padding: 0.8rem;
      font-weight: 600;
      width: 100%;
      transition: 0.2s;
    }

    .btn-outline-auth:hover {
      background: var(--emerald-50);
      border-color: var(--emerald-500);
      color: var(--emerald-800);
    }

    .auth-divider {
      display: flex;
      align-items: center;
      text-align: center;
      margin: 2rem 0;
      color: #94a3b8;
    }

    .auth-divider::before,
    .auth-divider::after {
      content: '';
      flex: 1;
      border-bottom: 1px solid #e2e8f0;
    }

    .auth-divider span {
      padding: 0 1rem;
      font-size: 0.9rem;
    }

    .social-login {
      display: flex;
      gap: 1rem;
      justify-content: center;
      margin-bottom: 2rem;
    }

    .social-btn {
      width: 50px;
      height: 50px;
      border-radius: 15px;
      border: 2px solid #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #475569;
      transition: 0.2s;
      text-decoration: none;
    }

    .social-btn:hover {
      border-color: var(--emerald-400);
      background: var(--emerald-50);
      color: var(--emerald-700);
      transform: translateY(-3px);
    }

    .auth-footer {
      text-align: center;
      margin-top: 2rem;
      color: #64748b;
    }

    .auth-footer a {
      color: var(--emerald-600);
      font-weight: 600;
      text-decoration: none;
    }

    .auth-footer a:hover {
      text-decoration: underline;
    }

    .forgot-password {
      text-align: right;
      margin: 0.5rem 0 1rem;
    }

    .forgot-password a {
      color: #64748b;
      font-size: 0.9rem;
      text-decoration: none;
    }

    .forgot-password a:hover {
      color: var(--emerald-600);
    }

    /* Tabs pour connexion/inscription */
    .auth-tabs {
      display: flex;
      gap: 1rem;
      margin-bottom: 2rem;
      background: #f1f5f9;
      padding: 0.5rem;
      border-radius: 60px;
    }

    .auth-tab {
      flex: 1;
      text-align: center;
      padding: 0.8rem;
      border-radius: 50px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
      border: none;
      background: transparent;
    }

    .auth-tab.active {
      background: white;
      color: var(--emerald-700);
      box-shadow: 0 4px 10px rgba(0,0,0,0.03);
    }

    /* Checkbox personnalisée */
    .form-check-input:checked {
      background-color: var(--emerald-600);
      border-color: var(--emerald-600);
    }

    /* Messages d'erreur/succès */
    .alert-message {
      border-radius: 16px;
      padding: 1rem;
      margin-bottom: 1.5rem;
      display: none;
    }

    .alert-success {
      background: #d1fae5;
      color: #065f46;
      border: 1px solid #a7f3d0;
    }

    .alert-error {
      background: #fee2e2;
      color: #b91c1c;
      border: 1px solid #fecaca;
    }

    /* RESPONSIVITÉ AJOUTÉE */
    @media (max-width: 768px) {
      .auth-card {
        padding: 2rem;
        margin: 0 1rem;
      }
      
      .auth-logo {
        font-size: 1.8rem;
      }
      
      .auth-logo i {
        font-size: 2rem;
      }
      
      .auth-title {
        font-size: 1.8rem;
      }
      
      .auth-subtitle {
        font-size: 0.95rem;
      }
      
      .auth-tabs {
        gap: 0.5rem;
      }
      
      .auth-tab {
        padding: 0.6rem;
        font-size: 0.95rem;
      }
      
      .row.g-3 {
        flex-direction: column;
      }
      
      .col-md-6 {
        width: 100%;
      }
      
      .btn-auth {
        padding: 0.9rem;
        font-size: 1rem;
      }
      
      .social-login {
        gap: 0.8rem;
      }
      
      .social-btn {
        width: 45px;
        height: 45px;
      }
      
      .auth-footer {
        font-size: 0.95rem;
      }
    }

    @media (max-width: 576px) {
      .auth-card {
        padding: 1.5rem;
      }
      
      .auth-logo {
        font-size: 1.5rem;
        margin-bottom: 1rem;
      }
      
      .auth-logo i {
        font-size: 1.7rem;
      }
      
      .auth-title {
        font-size: 1.5rem;
      }
      
      .auth-subtitle {
        font-size: 0.9rem;
      }
      
      .auth-tabs {
        padding: 0.4rem;
      }
      
      .auth-tab {
        padding: 0.5rem;
        font-size: 0.9rem;
      }
      
      .auth-form .form-label {
        font-size: 0.95rem;
        margin-bottom: 0.3rem;
      }
      
      .auth-form .form-control {
        padding: 0.7rem 1rem;
        font-size: 0.95rem;
      }
      
      .auth-form .input-group-text {
        padding: 0.7rem 1rem;
      }
      
      .forgot-password a {
        font-size: 0.85rem;
      }
      
      .form-check-label {
        font-size: 0.9rem;
      }
      
      .btn-auth {
        padding: 0.8rem;
        font-size: 0.95rem;
        margin-top: 0.5rem;
      }
      
      .auth-divider {
        margin: 1.5rem 0;
      }
      
      .auth-divider span {
        font-size: 0.85rem;
      }
      
      .social-login {
        gap: 0.5rem;
        margin-bottom: 1.5rem;
      }
      
      .social-btn {
        width: 40px;
        height: 40px;
        border-radius: 12px;
      }
      
      .social-btn i {
        font-size: 1.1rem;
      }
      
      .auth-footer {
        font-size: 0.9rem;
        margin-top: 1.5rem;
      }
      
      .alert-message {
        padding: 0.8rem;
        font-size: 0.9rem;
      }
      
      small.text-secondary {
        font-size: 0.8rem;
      }
    }

    @media (max-width: 400px) {
      .auth-card {
        padding: 1.2rem;
      }
      
      .auth-logo {
        font-size: 1.3rem;
      }
      
      .auth-logo i {
        font-size: 1.5rem;
      }
      
      .auth-title {
        font-size: 1.3rem;
      }
      
      .auth-subtitle {
        font-size: 0.85rem;
      }
      
      .auth-tabs {
        padding: 0.3rem;
      }
      
      .auth-tab {
        padding: 0.4rem;
        font-size: 0.85rem;
      }
      
      .auth-form .form-label {
        font-size: 0.9rem;
      }
      
      .auth-form .form-control {
        padding: 0.6rem 0.8rem;
        font-size: 0.9rem;
      }
      
      .auth-form .input-group-text {
        padding: 0.6rem 0.8rem;
        font-size: 0.9rem;
      }
      
      .forgot-password {
        margin: 0.3rem 0 0.8rem;
      }
      
      .forgot-password a {
        font-size: 0.8rem;
      }
      
      .form-check-label {
        font-size: 0.85rem;
      }
      
      .btn-auth {
        padding: 0.7rem;
        font-size: 0.9rem;
      }
      
      .auth-divider {
        margin: 1.2rem 0;
      }
      
      .social-btn {
        width: 35px;
        height: 35px;
      }
      
      .social-btn i {
        font-size: 1rem;
      }
      
      .auth-footer {
        font-size: 0.85rem;
      }
    }

    @media (max-width: 350px) {
      .auth-card {
        padding: 1rem;
      }
      
      .auth-logo {
        font-size: 1.1rem;
      }
      
      .auth-logo i {
        font-size: 1.3rem;
      }
      
      .auth-title {
        font-size: 1.1rem;
      }
      
      .auth-subtitle {
        font-size: 0.8rem;
      }
      
      .auth-tab {
        font-size: 0.8rem;
        padding: 0.3rem;
      }
      
      .auth-form .form-label {
        font-size: 0.85rem;
      }
      
      .auth-form .form-control {
        padding: 0.5rem 0.7rem;
        font-size: 0.85rem;
      }
      
      .auth-form .input-group-text {
        padding: 0.5rem 0.7rem;
        font-size: 0.85rem;
      }
      
      .btn-auth {
        padding: 0.6rem;
        font-size: 0.85rem;
      }
      
      .social-btn {
        width: 30px;
        height: 30px;
      }
      
      .social-btn i {
        font-size: 0.9rem;
      }
      
      .auth-footer {
        font-size: 0.8rem;
      }
    }

    /* Amélioration de l'affichage des grilles sur mobile */
    @media (max-width: 576px) {
      .row.g-3 {
        margin: 0;
      }
      
      .col-md-6 {
        padding: 0 0 0.5rem 0;
      }
      
      .col-md-6:last-child {
        padding-bottom: 0;
      }
    }

    /* Ajustement des espacements des formulaires */
    @media (max-width: 576px) {
      .mb-4 {
        margin-bottom: 1rem !important;
      }
      
      .mb-3 {
        margin-bottom: 0.8rem !important;
      }
      
      .mt-3 {
        margin-top: 0.8rem !important;
      }
    }

    /* Amélioration de la lisibilité des liens */
    @media (max-width: 576px) {
      .form-check-label a {
        word-break: break-word;
      }
    }

    /* Centrage parfait sur mobile */
    @media (max-width: 576px) {
      .auth-wrapper {
        padding: 1rem 0.5rem;
      }
      
      body {
        align-items: flex-start;
        padding: 1rem 0;
      }
    }

    /* Ajustement des messages d'alerte */
    @media (max-width: 576px) {
      .alert-message i {
        font-size: 1rem;
      }
      
      .alert-message {
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }
    }

    /* Correction du bouton de connexion avec lien */
    .btn-auth a {
      color: white;
      text-decoration: none;
    }
    
    .btn-auth a:hover {
      color: white;
    }
  </style>
</head>
<body>

<div class="auth-wrapper">
  <div class="auth-card">
    <!-- Logo -->
    <div class="auth-header">
      <a href="#" class="auth-logo">
        <i class="bi bi-gem"></i>
        <span>DropManage</span>
      </a>
      <div class="auth-title" id="authTitle">Bienvenue !</div>
      <div class="auth-subtitle" id="authSubtitle">Connectez-vous pour accéder à votre compte</div>
    </div>

    <!-- Messages d'alerte -->
    <div id="successMessage" class="alert-message alert-success">
      <i class="bi bi-check-circle-fill me-2"></i>
      <span id="successText">Connexion réussie ! Redirection...</span>
    </div>
    <div id="errorMessage" class="alert-message alert-error">
      <i class="bi bi-exclamation-triangle-fill me-2"></i>
      <span id="errorText">Email ou mot de passe incorrect</span>
    </div>

    <!-- Tabs Connexion / Inscription -->
    <div class="auth-tabs">
      <button class="auth-tab active" id="loginTab" onclick="switchTab('login')">Connexion</button>
      <button class="auth-tab" id="registerTab" onclick="switchTab('register')">Inscription</button>
    </div>

    <!-- Formulaire de Connexion -->
    <div id="loginForm">
      <form class="auth-form" onsubmit="handleLogin(event)">
        <div class="mb-4">
          <label class="form-label">Email</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-envelope"></i></span>
            <input type="email" class="form-control" id="loginEmail" placeholder="exemple@email.com" required>
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label">Mot de passe</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock"></i></span>
            <input type="password" class="form-control" id="loginPassword" placeholder="••••••••" required>
          </div>
        </div>

        <div class="forgot-password">
          <a href="#" onclick="showForgotPassword()">Mot de passe oublié ?</a>
        </div>

        <div class="d-flex justify-content-between align-items-center mb-4">
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="rememberMe">
            <label class="form-check-label" for="rememberMe">
              Se souvenir de moi
            </label>
          </div>
        </div>

        <button type="submit" class="btn-auth">
          <i class="bi bi-box-arrow-in-right me-2"></i>
          <a href="boutique.html">Se connecter</a>
        </button>
      </form>
    </div>

    <!-- Formulaire d'Inscription -->
    <div id="registerForm" style="display: none;">
      <form class="auth-form" onsubmit="handleRegister(event)">
        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label">Prénom</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-person"></i></span>
              <input type="text" class="form-control" id="registerFirstName" placeholder="Jean" required>
            </div>
          </div>
          <div class="col-md-6">
            <label class="form-label">Nom</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-person"></i></span>
              <input type="text" class="form-control" id="registerLastName" placeholder="Dupont" required>
            </div>
          </div>
        </div>

        <div class="mb-3 mt-3">
          <label class="form-label">Email</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-envelope"></i></span>
            <input type="email" class="form-control" id="registerEmail" placeholder="exemple@email.com" required>
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label">Téléphone</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-phone"></i></span>
            <input type="tel" class="form-control" id="registerPhone" placeholder="+225 07 89 45 67 89">
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label">Mot de passe</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock"></i></span>
            <input type="password" class="form-control" id="registerPassword" placeholder="••••••••" required>
          </div>
          <small class="text-secondary">Minimum 8 caractères</small>
        </div>

        <div class="mb-3">
          <label class="form-label">Confirmer le mot de passe</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
            <input type="password" class="form-control" id="registerConfirmPassword" placeholder="••••••••" required>
          </div>
        </div>

        <div class="form-check mb-4">
          <input class="form-check-input" type="checkbox" id="acceptTerms" required>
          <label class="form-check-label" for="acceptTerms">
            J'accepte les <a href="#" class="text-emerald-600">conditions d'utilisation</a> et la <a href="#" class="text-emerald-600">politique de confidentialité</a>
          </label>
        </div>

        <button type="submit" class="btn-auth">
          <i class="bi bi-person-plus me-2"></i>S'inscrire
        </button>
      </form>
    </div>

    <!-- Formulaire Mot de passe oublié -->
    <div id="forgotPasswordForm" style="display: none;">
      <form class="auth-form" onsubmit="handleForgotPassword(event)">
        <p class="text-secondary mb-4">Entrez votre email pour recevoir un lien de réinitialisation</p>
        
        <div class="mb-4">
          <label class="form-label">Email</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-envelope"></i></span>
            <input type="email" class="form-control" id="forgotEmail" placeholder="exemple@email.com" required>
          </div>
        </div>

        <button type="submit" class="btn-auth">
          <i class="bi bi-send me-2"></i>Envoyer le lien
        </button>

        <div class="text-center mt-3">
          <a href="#" onclick="backToLogin()" class="text-emerald-600 text-decoration-none">
            <i class="bi bi-arrow-left"></i> Retour à la connexion
          </a>
        </div>
      </form>
    </div>

    <!-- Séparateur -->
    <div class="auth-divider">
      <span>ou</span>
    </div>

    <!-- Connexion avec réseaux sociaux -->
    <div class="social-login">
      <a href="#" class="social-btn" onclick="socialLogin('google')">
        <i class="bi bi-google"></i>
      </a>
      <a href="#" class="social-btn" onclick="socialLogin('facebook')">
        <i class="bi bi-facebook"></i>
      </a>
      <a href="#" class="social-btn" onclick="socialLogin('apple')">
        <i class="bi bi-apple"></i>
      </a>
    </div>

    <!-- Footer -->
    <div class="auth-footer" id="authFooter">
      <span>Nouveau client ?</span>
      <a href="#" onclick="switchTab('register'); return false;">Créer un compte</a>
    </div>
  </div>
</div>

<script>
  // Switch entre Connexion et Inscription
  function switchTab(tab) {
    const loginForm = document.getElementById('loginForm');
    const registerForm = document.getElementById('registerForm');
    const loginTab = document.getElementById('loginTab');
    const registerTab = document.getElementById('registerTab');
    const authTitle = document.getElementById('authTitle');
    const authSubtitle = document.getElementById('authSubtitle');
    const authFooter = document.getElementById('authFooter');
    
    if (tab === 'login') {
      loginForm.style.display = 'block';
      registerForm.style.display = 'none';
      document.getElementById('forgotPasswordForm').style.display = 'none';
      loginTab.classList.add('active');
      registerTab.classList.remove('active');
      authTitle.textContent = 'Bienvenue !';
      authSubtitle.textContent = 'Connectez-vous pour accéder à votre compte';
      authFooter.innerHTML = '<span>Nouveau client ?</span> <a href="#" onclick="switchTab(\'register\'); return false;">Créer un compte</a>';
    } else {
      loginForm.style.display = 'none';
      registerForm.style.display = 'block';
      document.getElementById('forgotPasswordForm').style.display = 'none';
      registerTab.classList.add('active');
      loginTab.classList.remove('active');
      authTitle.textContent = 'Créer un compte';
      authSubtitle.textContent = 'Rejoignez DropManage pour commencer à acheter';
      authFooter.innerHTML = '<span>Déjà un compte ?</span> <a href="#" onclick="switchTab(\'login\'); return false;">Se connecter</a>';
    }
    
    hideMessages();
  }

  // Afficher formulaire mot de passe oublié
  function showForgotPassword() {
    document.getElementById('loginForm').style.display = 'none';
    document.getElementById('registerForm').style.display = 'none';
    document.getElementById('forgotPasswordForm').style.display = 'block';
    
    document.getElementById('authTitle').textContent = 'Mot de passe oublié';
    document.getElementById('authSubtitle').textContent = 'Recevez un lien de réinitialisation';
    document.getElementById('authFooter').innerHTML = '<a href="#" onclick="backToLogin()">Retour à la connexion</a>';
    
    // Désactiver les tabs
    document.getElementById('loginTab').classList.remove('active');
    document.getElementById('registerTab').classList.remove('active');
    
    hideMessages();
  }

  // Retour à la connexion
  function backToLogin() {
    switchTab('login');
  }

  // Gestion connexion
  function handleLogin(event) {
    event.preventDefault();
    const email = document.getElementById('loginEmail').value;
    const password = document.getElementById('loginPassword').value;
    
    // Simulation de validation
    if (email === 'demo@dropmanage.com' && password === 'password123') {
      showMessage('success', 'Connexion réussie ! Redirection...');
      setTimeout(() => {
        window.location.href = 'account.html';
      }, 1500);
    } else {
      showMessage('error', 'Email ou mot de passe incorrect');
    }
  }

  // Gestion inscription
  function handleRegister(event) {
    event.preventDefault();
    const password = document.getElementById('registerPassword').value;
    const confirm = document.getElementById('registerConfirmPassword').value;
    
    if (password !== confirm) {
      showMessage('error', 'Les mots de passe ne correspondent pas');
      return;
    }
    
    if (password.length < 8) {
      showMessage('error', 'Le mot de passe doit contenir au moins 8 caractères');
      return;
    }
    
    showMessage('success', 'Inscription réussie ! Redirection...');
    setTimeout(() => {
      window.location.href = 'account.html';
    }, 1500);
  }

  // Gestion mot de passe oublié
  function handleForgotPassword(event) {
    event.preventDefault();
    const email = document.getElementById('forgotEmail').value;
    
    showMessage('success', 'Un lien de réinitialisation a été envoyé à votre email');
    
    setTimeout(() => {
      backToLogin();
    }, 2000);
  }

  // Connexion sociale
  function socialLogin(provider) {
    showMessage('success', `Connexion avec ${provider}...`);
    setTimeout(() => {
      window.location.href = 'account.html';
    }, 1500);
  }

  // Afficher les messages
  function showMessage(type, text) {
    const successMsg = document.getElementById('successMessage');
    const errorMsg = document.getElementById('errorMessage');
    const successText = document.getElementById('successText');
    const errorText = document.getElementById('errorText');
    
    if (type === 'success') {
      successText.textContent = text;
      successMsg.style.display = 'block';
      errorMsg.style.display = 'none';
    } else {
      errorText.textContent = text;
      errorMsg.style.display = 'block';
      successMsg.style.display = 'none';
    }
  }

  // Cacher les messages
  function hideMessages() {
    document.getElementById('successMessage').style.display = 'none';
    document.getElementById('errorMessage').style.display = 'none';
  }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
